<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ONAFBU</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%238b5cf6'/%3E%3Cstop offset='100%25' stop-color='%23ec4899'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Ctext x='50' y='68' font-family='Arial, sans-serif' font-size='56' font-weight='bold' fill='white' text-anchor='middle'%3EO%3C/text%3E%3C/svg%3E">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- App Wrapper -->
  <div class="app-wrapper">
    
    <!-- Navbar -->
    <header class="paper-navbar">
      <div class="nav-brand" onclick="goHome()">ONAFBU</div>
      <div class="nav-actions">
        <!-- Avatar removed -->
      </div>
    </header>

    <!-- Global Dashboard -->
    <main id="dashboardView" class="dashboard-container">
      <div class="greeting-section">
        <h1 class="greeting-title" id="greetingTitle">Good Evening.</h1>
        <p class="greeting-subtitle">Select a subject to continue your journey.</p>
        
        <div class="global-capsules clickable-capsules" id="globalCapsules" onclick="openTrackerModal()" title="Click to open Detailed Tracker">
          <!-- Injected by app.js -->
        </div>
      </div>
      
      <div class="course-grid" id="courseGrid">
        <!-- Injected by app.js -->
      </div>
    </main>

    <!-- Course View (Timeline) -->
    <main id="courseView" class="hidden course-container">
      <div class="course-header paper-panel">
        <button class="paper-btn icon-btn" onclick="goHome()"><i class="ri-arrow-left-line"></i></button>
        <div class="course-header-info" style="flex:1;">
          <h2 id="courseTitle">Course Name</h2>
          <p id="courseStats"><span id="completedCount">0</span> Classes Completed</p>
        </div>
        <button class="paper-btn icon-btn" onclick="showCoursePdfs()"><i class="ri-book-3-line"></i> <span class="hide-mobile">Materials</span></button>
      </div>
      
      <div class="search-bar paper-panel">
        <div style="display: flex; align-items: center; gap: 12px; flex: 1;">
          <i class="ri-search-line"></i>
          <input type="text" id="searchInput" placeholder="Search lessons...">
        </div>
        <div class="view-toggles" style="display: flex; gap: 4px;">
          <button class="paper-btn icon-btn active-view" id="listViewBtn" onclick="setViewMode('list')"><i class="ri-list-check"></i></button>
          <button class="paper-btn icon-btn" id="gridViewBtn" onclick="setViewMode('grid')"><i class="ri-grid-fill"></i></button>
        </div>
      </div>
      
      <div class="timeline-list" id="timelineList">
        <!-- Injected by app.js -->
      </div>
    </main>

  </div>

  <!-- Fullscreen Video Player Modal -->
  <div id="playerView" class="hidden player-overlay paper-panel">
    <div class="player-header">
      <button class="paper-btn icon-btn" onclick="closePlayer()"><i class="ri-arrow-left-s-line"></i> Back</button>
      <h3 id="nowPlayingTitle" class="truncate">Class Title</h3>
      <div></div> <!-- Spacer -->
    </div>
    
    <div class="video-container">
      <div class="mac-frame">
        <div class="mac-header">
          <div class="mac-buttons">
             <span class="mac-btn close"></span>
             <span class="mac-btn min"></span>
             <span class="mac-btn max"></span>
          </div>
          <div class="mac-title" id="macTitle">Course Player</div>
        </div>
        <div class="mac-body">
          <video id="videoElement" controls playsinline></video>
          <div id="youtubeContainer" class="hidden yt-container"></div>
        </div>
      </div>
      
      <div class="quality-selector" id="qualitySelector">
        <select id="speedSelector" class="paper-select" onchange="setSpeed(Number(this.value))">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
        <select id="nativeQualitySelector" class="paper-select" onchange="setQuality(Number(this.value))">
          <option value="-1">Auto</option>
        </select>
      </div>
    </div>
    
    <div class="player-controls paper-panel">
      <button class="paper-btn" id="prevBtn"><i class="ri-skip-back-line"></i></button>
      <button class="paper-btn mark-watched-btn" id="markWatchedBtn"><i class="ri-check-line"></i> Mark Done</button>
      <button class="paper-btn" id="nextBtn"><i class="ri-skip-forward-line"></i></button>
    </div>
  </div>

  <!-- PDF Modal -->
  <div id="pdfModal" class="hidden overlay-modal">
    <div class="modal-content paper-panel">
      <div class="modal-header">
        <h2>Study Materials</h2>
        <button class="paper-btn icon-btn" onclick="closePdfs()"><i class="ri-close-line"></i></button>
      </div>
      <div class="modal-body" id="pdfContainer">
        <!-- Categorized PDFs injected here (Accordions) -->
      </div>
    </div>
  </div>

  <!-- Detailed Tracker Modal -->
  <div id="trackerModal" class="hidden overlay-modal">
    <div class="modal-content paper-panel tracker-modal-content">
      <div class="modal-header">
        <h2><i class="ri-bar-chart-2-line" style="color: var(--accent-primary);"></i> Detailed Analytics</h2>
        <button class="paper-btn icon-btn" onclick="closeTrackerModal()"><i class="ri-close-line"></i></button>
      </div>
      <div class="modal-body">
        
        <div class="tracker-dashboard">
          <!-- Graph Section -->
          <div class="chart-container paper-panel">
            <canvas id="studyChart"></canvas>
          </div>
          
          <!-- AI Insight Section -->
          <div class="ai-insight-box paper-panel">
            <div class="ai-insight-header">
              <i class="ri-robot-2-fill"></i> AI Study Suggestion
            </div>
            <div class="ai-insight-text" id="aiSuggestionText">
              Loading insights...
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
